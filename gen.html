<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>冷蔵庫ARモデル ジェネレーター</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #f0f0f0; }
        .box { background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; }
        button { padding: 15px 30px; font-size: 18px; font-weight: bold; background: #ff6600; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #status { margin-top: 20px; color: #666; font-weight: bold; }
    </style>
</head>
<body>
    <div class="box">
        <h2>📦 冷蔵庫ARモデル (.usdz) 作成</h2>
        <p>1.34m × 1.98m × 0.62m</p>
        <button id="download-btn">USDZを生成して保存</button>
        <div id="status"></div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.150.1/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.150.1/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { USDZExporter } from 'three/addons/exporters/USDZExporter.js';

        const status = document.getElementById('status');
        const btn = document.getElementById('download-btn');

        btn.addEventListener('click', async () => {
            status.innerText = "生成を開始しました...";
            btn.disabled = true;

            try {
                const scene = new THREE.Scene();
                // 指定サイズの箱を作成
                const geometry = new THREE.BoxGeometry(1.34, 1.98, 0.62);
                const material = new THREE.MeshStandardMaterial({ color: 0xffffff });
                const box = new THREE.Mesh(geometry, material);
                box.position.y = 1.98 / 2; // 接地させる
                scene.add(box);

                status.innerText = "USDZ形式に変換中...（数秒かかります）";
                const exporter = new USDZExporter();
                
                // USDZの生成（Promise対応）
                const result = await exporter.parse(scene);
                
                const blob = new Blob([result], { type: 'model/vnd.usdz+zip' });
                const url = URL.createObjectURL(blob);

                const link = document.createElement('a');
                link.href = url;
                link.download = 'fridge_model.usdz';
                link.click();
                
                status.innerText = "✅ 完了しました！";
            } catch (error) {
                status.innerText = "❌ エラー: " + error.message;
                console.error(error);
            } finally {
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
