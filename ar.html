<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR 設置シミュレーター (Debug版)</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #222; font-family: sans-serif; }
        #status {
            position: fixed; top: 10px; left: 10px; right: 10px;
            padding: 10px; background: rgba(0,0,0,0.7);
            color: #00ff00; font-size: 12px; z-index: 1000;
            border-radius: 5px; pointer-events: none;
        }
        .ar-button {
            position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%);
            padding: 15px 30px; background: #ff6600; color: white;
            border: none; border-radius: 30px; font-weight: bold; font-size: 18px;
            display: none; /* モデルができるまで隠す */
        }
    </style>
</head>
<body>

    <div id="status">システム起動中...</div>

    <model-viewer 
        id="viewer"
        camera-controls ar ar-modes="webxr quick-look" 
        ar-scale="fixed" ar-placement="floor"
        shadow-intensity="1" 
        style="width: 100vw; height: 100vh;">
        <button slot="ar-button" id="ar-btn" class="ar-button">📱 床に配置する</button>
    </model-viewer>

    <script type="module">
        import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.150.1/build/three.module.js';
        import { GLTFExporter } from 'https://cdn.jsdelivr.net/npm/three@0.150.1/examples/jsm/exporters/GLTFExporter.js';

        const status = document.getElementById('status');
        const arBtn = document.getElementById('ar-btn');

        async function init() {
            try {
                status.innerText = "3Dモデルを作成中...";
                const scene = new THREE.Scene();

                // 冷蔵庫2台の作成
                const geometry = new THREE.BoxGeometry(0.62, 1.98, 0.62);
                const material = new THREE.MeshStandardMaterial({ color: 0xffffff });

                const left = new THREE.Mesh(geometry, material);
                left.position.set(-0.36, 1.98 / 2, 0);
                scene.add(left);

                const right = new THREE.Mesh(geometry, material);
                right.position.set(0.36, 1.98 / 2, 0);
                scene.add(right);

                status.innerText = "AR形式に変換中...";
                const exporter = new GLTFExporter();
                
                // GLB形式で書き出し
                exporter.parse(scene, (result) => {
                    const blob = new Blob([result], { type: 'application/octet-stream' });
                    const url = URL.createObjectURL(blob);
                    
                    const viewer = document.getElementById('viewer');
                    viewer.src = url;
                    
                    status.innerText = "準備完了！ボタンを押してください。";
                    arBtn.style.display = "block";
                }, 
                (error) => {
                    status.innerText = "変換エラー: " + error;
                },
                { binary: true }); // iPhoneと相性の良いバイナリモード

            } catch (e) {
                status.innerText = "起動エラー: " + e.message;
                console.error(e);
            }
        }

        init();
    </script>
</body>
</html>
