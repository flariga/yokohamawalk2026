<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AR冷蔵庫 設置イメージ（3Dファイル不要）</title>
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <style>
    /* 画面下部に表示するサイズ情報のUI */
    #info-box {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: rgba(255, 255, 255, 0.9);
      padding: 10px;
      border-radius: 8px;
      border: 1px solid #ff6600;
      color: #333;
      font-family: sans-serif;
      font-size: 14px;
      z-style: 1000;
    }
  </style>
</head>
<body>

  <a-scene 
    embedded 
    arjs='sourceType: webcam; debugUIEnabled: false;' 
    vr-mode-ui="enabled: false">
    
    <a-camera raycaster="objects: .collidable;"></a-camera>

    <a-box 
      position="0 1 0" 
      width="1.69" 
      height="1.98" 
      depth="0.62" 
      color="#FFBB66" 
      material="opacity: 0.9; transparent: true; metalness: 0.2;" 
      shadow>
    </a-box>

    <a-plane position="0 0 0" rotation="-90 0 0" width="10" height="10" color="#333" opacity="0.1" shadow="receive: true"></a-plane>

    <a-entity light="type: ambient; color: #BBB;"></a-entity>
    <a-entity light="type: directional; color: #FFF; intensity: 0.6" position="-1 1 1"></a-entity>
  </a-scene>

  <div id="info-box">
    <strong>冷蔵庫の設置イメージ（実物大）</strong><br>
    サイズ：幅 1.69m × 高さ 1.98m × 奥行 0.62m<br>
    ※実際は扉を開くスペース等が必要です。
  </div>

</body>
</html>
