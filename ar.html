<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AR床認識 冷蔵庫設置</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
</head>
<body style="margin: 0; background: #222;">

    <model-viewer 
        id="fridge-viewer"
        camera-controls 
        ar 
        ar-modes="webxr quick-look" 
        ar-scale="fixed"
        ar-placement="floor"
        shadow-intensity="1" 
        style="width: 100vw; height: 100vh;">
        
        <button slot="ar-button" style="position: absolute; bottom: 50px; left: 50%; transform: translateX(-50%); padding: 15px 30px; background: #ff6600; color: white; border: none; border-radius: 30px; font-weight: bold; font-size: 18px; z-index: 100;">
            📱 床を認識して配置
        </button>

        <div id="loading-msg" style="color: white; text-align: center; padding-top: 50vh;">
            3Dモデルを生成中...
        </div>
    </model-viewer>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.150.1';
        import { GLTFExporter } from 'https://cdn.skypack.dev/three@0.150.1/examples/jsm/exporters/GLTFExporter.js';

        async function createFridgeModel() {
            const scene = new THREE.Scene();

            // 冷蔵庫1台のサイズ (幅0.62, 高さ1.98, 奥行0.62)
            const geometry = new THREE.BoxGeometry(0.62, 1.98, 0.62);
            const material = new THREE.MeshStandardMaterial({ color: 0xffffff, roughness: 0.5 });

            // 2つの立方体を10cm離して配置
            // 中心からそれぞれ (幅0.62/2 + 隙間0.1/2) = 0.36m ずつずらす
            const leftFridge = new THREE.Mesh(geometry, material);
            leftFridge.position.set(-0.36, 1.98 / 2, 0); // 底を接地させるため高さ半分上げる
            scene.add(leftFridge);

            const rightFridge = new THREE.Mesh(geometry, material);
            rightFridge.position.set(0.36, 1.98 / 2, 0);
            scene.add(rightFridge);

            // GLB形式に変換
            const exporter = new GLTFExporter();
            exporter.parse(scene, (result) => {
                const blob = new Blob([JSON.stringify(result)], { type: 'application/json' });
                const url = URL.createObjectURL(blob);
                
                // model-viewerに生成したモデルをセット
                const viewer = document.getElementById('fridge-viewer');
                viewer.src = url;
                document.getElementById('loading-msg').style.display = 'none';
            }, { binary: false });
        }

        createFridgeModel();
    </script>
</body>
</html>
