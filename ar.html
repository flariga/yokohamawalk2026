<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>冷蔵庫 AR設置シミュレーション（iPhone対応版）</title>
  <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
  <style>
    body { margin: 0; background-color: #333; }
    model-viewer {
      width: 100vw;
      height: 100vh;
    }
    /* AR起動ボタンのデザイン */
    .ar-button {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background-color: #ff6600;
      color: white;
      padding: 16px 32px;
      border-radius: 30px;
      border: none;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 4px 10px rgba(0,0,0,0.3);
      cursor: pointer;
    }
  </style>
</head>
<body>

  <model-viewer 
    src="https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Models/master/2.0/Box/glTF-Binary/Box.glb" 
    ar 
    ar-modes="quick-look webxr" 
    ar-scale="fixed"
    camera-controls 
    scale="1.69 1.98 0.62"
    alt="冷蔵庫のダミーボックス">
    
    <button slot="ar-button" class="ar-button">
      📱 床を認識して配置する
    </button>
  </model-viewer>

</body>
</html>
